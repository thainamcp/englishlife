name: EnglishLife
options:
  bundleIdPrefix: com.englishlife
  deploymentTarget:
    iOS: "17.0"
targets:
  EnglishLife:
    type: application
    platform: iOS
    sources:
      - path: EnglishLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.englishlife.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: English Life uses your microphone for live English conversation practice.
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
